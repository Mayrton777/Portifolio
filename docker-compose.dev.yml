services:
  portfolio-dev:
    image: node:20-alpine # Ignora o Dockerfile de produção e usa o Node direto
    container_name: mayrton_portfolio_dev
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./:/app           
      - /app/node_modules # Evita conflitos de node_modules entre host e container
    tty: true
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"